# Shadow

shadow = false;
shadow-radius = 15;
offset-x = -25;
offset-y = -25;
shadow-opacity = 2;
corner_radius = 10;
no-dnd-shadow = true;
no-dock-shadow = true;
clear-shadow = false;

shadow-exclude = [
	"name = 'Notification'",
	"class_g = 'Conky'",
	"class_g ?= 'Notify-osd'",
	"class_g = 'Cairo-clock'",
	"_GTK_FRAME_EXTENTS@:c",
];

# Logs
log-level = "ERROR";
log-file = "~/.cache/picom-log.log";

# Opacity

opacity = 0.7
inactive-opacity = 0.7;
active-opacity = 0.5;

opacity-rule = [ 
  "100:class_g = 'firefox'",
  "80:class_g = 'kitty'",
  "75:class_g = 'Polybar'",
	"95:window_type = 'normal' && focused",		
	"95:window_type = 'normal' && !focused",
	"95:window_type = 'dialog'",		
  "95:window_type = 'popup_menu'",	
	"95:window_type = 'notification'"
];

# Blur

blur: {
    method = "dual_kawase";
    strength = 1.5;
    background = false;
    background-frame = false;
    background-fixed = false;
}

blur-background = true;
blur-background-frame = true;
blur-background-fixed = true;

blur-background-exclude = [
	"window_type = 'desktop'",
	"window_type = 'utility'",
	"class_g = 'slop'",
  "class_g = 'Gromit-mpx'",
	"_GTK_FRAME_EXTENTS@:c",
];

# Fading

# fading = true;
# fade-delta = 6;
# fade-in-step = 0.03;
# fade-out-step = 0.3;
# fade-exclude = [ ];

# Animations
animations = true;
animation-stiffness-in-tag = 250;
animation-stiffness-tag-change = 90.0;

animation-window-mass = 0.4;
animation-dampening = 15;
animation-clamping = true;

animation-for-open-window = "zoom";
animation-for-unmap-window = "squeeze";
animation-for-transient-window = "slide-up";

animation-for-prev-tag = "minimize";
enable-fading-prev-tag = true;

animation-for-next-tag = "slide-in-center";
enable-fading-next-tag = true;

# Other

backend = "glx";
mark-wmwin-focused = true;
mark-ovredir-focused = true;
detect-rounded-corners = true;
detect-client-opacity = true;
refresh-rate = 0;
unredir-if-possible = false;

focus-exclude = [
	"class_g ?= 'rofi'",
];

detect-transient = true;
detect-client-leader = true;
invert-color-include = [ ];

# GLX backend

glx-no-stencil = true;
use-damage = true;

# Window type settings

wintypes:
{
	tooltip = { fade = true; shadow = false; focus = false;	};
	normal = { shadow = false; };
	dock = { shadow = false; };
	dnd = { shadow = false; };
	popup_menu = { shadow = false; focus = true; opacity = 0.90; };
	dropdown_menu = { shadow = false; focus = false; };
	above = { shadow = false; };
	splash = { shadow = false; };
	utility = { focus = false; shadow = false; };
	notification = { shadow = false; };
	desktop = { shadow = false};
	menu = { shadow = false; focus = false };
	dialog = { shadow = false; };
};

corner-radius = 20;
round-borders = 10;
